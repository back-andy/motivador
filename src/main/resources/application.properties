spring.application.name=motivador

# Conexão com banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/motivador
#insira seu username e o password abaixo
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:123456}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Formata o SQL para ficar legível
spring.jpa.properties.hibernate.format_sql=true

# Mostra os valores reais dos parâmetros que você passou no ID
logging.level.org.hibernate.orm.jdbc.bind=trace